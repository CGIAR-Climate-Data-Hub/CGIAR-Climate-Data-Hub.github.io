<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3 0 128 72" role="img" aria-label="CGIAR Climate Commons">
  <!-- The CDH logo IS a diverging anomaly bar chart — cool below baseline /
       warm above, deeper colour = larger anomaly. Canonical asset; the white
       -baseline variant for dark backgrounds is cdh-mark-dark.svg. -->
