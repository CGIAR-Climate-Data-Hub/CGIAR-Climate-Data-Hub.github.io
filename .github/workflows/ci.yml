name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Lint & format (Biome)
        run: bun run ci
      - name: Type-check
        run: bun run astro check
      - name: Build
        run: bun run build
