version: 2
updates:
  # JS/TS deps (astro, biome, …) bun reads package.json + bun.lock,
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
    # Currently TS 7.0 is not compatible with Astro, remove when it is
      - dependency-name: "typescript"
        versions: ["7.x"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
